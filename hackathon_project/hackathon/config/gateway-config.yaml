# LiteLLM Gateway Configuration
# This file configures the LLM proxy gateway

# Model List - Define all available models and their providers
model_list:
  # OpenAI Models
  - model_name: gpt-4
    litellm_params:
      model: openai/gpt-4
      api_key: "os.environ/OPENAI_API_KEY"
      rpm: 1000
      tpm: 100000

  - model_name: gpt-4-turbo
    litellm_params:
      model: openai/gpt-4-turbo-preview
      api_key: "os.environ/OPENAI_API_KEY"
      rpm: 1000
      tpm: 100000

  - model_name: gpt-3.5-turbo
    litellm_params:
      model: openai/gpt-3.5-turbo
      api_key: "os.environ/OPENAI_API_KEY"
      rpm: 3000
      tpm: 200000

  # Anthropic Models
  - model_name: claude-3-opus
    litellm_params:
      model: anthropic/claude-3-opus-20240229
      api_key: "os.environ/ANTHROPIC_API_KEY"
      rpm: 100
      tpm: 50000

  - model_name: claude-3-sonnet
    litellm_params:
      model: anthropic/claude-3-sonnet-20240229
      api_key: "os.environ/ANTHROPIC_API_KEY"
      rpm: 200
      tpm: 100000

  - model_name: claude-3-haiku
    litellm_params:
      model: anthropic/claude-3-haiku-20240307
      api_key: "os.environ/ANTHROPIC_API_KEY"
      rpm: 300
      tpm: 150000

# Router Settings - Configure fallback and load balancing
router_settings:
  routing_strategy: simple-shuffle
  enable_pre_call_checks: true
  timeout: 60
  num_retries: 3

# Virtual Key Settings - Define default budgets and limits
# These can be overridden per-key via API
virtual_key_defaults:
  max_budget: 100.0
  budget_duration: "30d"
  tpm_limit: 100000
  rpm_limit: 1000
  allowed_models: null  # null means all models

# General Settings
general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  proxy_batch_write_at: 60
  database_connection_pool_limit: 10
  alerting_threshold: 300
  alert_to_email_addresses: ["ops@company.com"]
  
  # UI Settings
  ui_access_mode: "admin"
  
  # Rate Limiting
  enable_ratelimiting: true

# LiteLLM Settings - Observability callbacks
litellm_settings:
  success_callback: ["otel"]
  failure_callback: ["otel"]
  service_callback: ["otel"]
  
  # Redact messages from logs for security
  redact_messages_in_logs: true
  
  # Disable telemetry
  telemetry: false

# Caching Configuration (requires Redis)
cache: true
cache_params:
  type: redis
  host: "os.environ/REDIS_HOST"
  port: "os.environ/REDIS_PORT"
  password: "os.environ/REDIS_PASSWORD"
  ttl: 3600

# Guardrails (optional)
guardrails:
  - prompt_injection:
      callbacks: ["llmguard_moderation"]
      default_on: false

# Pass-through Endpoints (optional)
pass_through_endpoints: []

# Allowed IPs (optional security)
allowed_ips: null
