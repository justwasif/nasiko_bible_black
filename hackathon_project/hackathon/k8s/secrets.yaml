apiVersion: v1
kind: Secret
metadata:
  name: llm-provider-secrets
  namespace: llm-gateway
type: Opaque
stringData:
  openai-api-key: "REPLACE_WITH_OPENAI_API_KEY"
  anthropic-api-key: "REPLACE_WITH_ANTHROPIC_API_KEY"
---
apiVersion: v1
kind: Secret
metadata:
  name: litellm-secrets
  namespace: llm-gateway
type: Opaque
stringData:
  master-key: "REPLACE_WITH_MASTER_KEY"
  database-url: "postgresql://litellm:password@postgres-service:5432/litellm"
  redis-host: "redis-service"
