apiVersion: v1
kind: Namespace
metadata:
  name: llm-gateway
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: llm-gateway
data:
  config.yaml: |
    model_list:
      - model_name: gpt-4
        litellm_params:
          model: openai/gpt-4
          api_key: "os.environ/OPENAI_API_KEY"
      - model_name: gpt-4-turbo
        litellm_params:
          model: openai/gpt-4-turbo-preview
          api_key: "os.environ/OPENAI_API_KEY"
      - model_name: gpt-3.5-turbo
        litellm_params:
          model: openai/gpt-3.5-turbo
          api_key: "os.environ/OPENAI_API_KEY"
      - model_name: claude-3-opus
        litellm_params:
          model: anthropic/claude-3-opus-20240229
          api_key: "os.environ/ANTHROPIC_API_KEY"
      - model_name: claude-3-sonnet
        litellm_params:
          model: anthropic/claude-3-sonnet-20240229
          api_key: "os.environ/ANTHROPIC_API_KEY"
    
    router_settings:
      routing_strategy: simple-shuffle
      enable_pre_call_checks: true
      timeout: 60
      num_retries: 3
    
    general_settings:
      master_key: "os.environ/LITELLM_MASTER_KEY"
      proxy_batch_write_at: 60
      database_connection_pool_limit: 10
      alerting_threshold: 300
      enable_ratelimiting: true
    
    litellm_settings:
      success_callback: ["otel"]
      failure_callback: ["otel"]
      redact_messages_in_logs: true
      telemetry: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-gateway
  namespace: llm-gateway
  labels:
    app: litellm-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: litellm-gateway
  template:
    metadata:
      labels:
        app: litellm-gateway
    spec:
      containers:
      - name: litellm
        image: ghcr.io/berriai/litellm:main-latest
        ports:
        - containerPort: 4000
          name: http
        env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-provider-secrets
              key: openai-api-key
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-provider-secrets
              key: anthropic-api-key
        - name: LITELLM_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-secrets
              key: master-key
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: litellm-secrets
              key: database-url
        - name: REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: litellm-secrets
              key: redis-host
        - name: REDIS_PORT
          value: "6379"
        volumeMounts:
        - name: config
          mountPath: /app/config.yaml
          subPath: config.yaml
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3
      volumes:
      - name: config
        configMap:
          name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: litellm-gateway
  namespace: llm-gateway
  labels:
    app: litellm-gateway
spec:
  selector:
    app: litellm-gateway
  ports:
  - port: 4000
    targetPort: 4000
    name: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: litellm-gateway
  namespace: llm-gateway
  annotations:
    konghq.com/strip-path: "true"
    konghq.com/plugins: rate-limiting
    kubernetes.io/ingress.class: kong
spec:
  rules:
  - host: gateway.your-domain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: litellm-gateway
            port:
              number: 4000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: litellm-gateway-hpa
  namespace: llm-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: litellm-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 4
        periodSeconds: 15
      selectPolicy: Max
